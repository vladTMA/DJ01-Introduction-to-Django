--->
{% extends "admin/change_list.html" %}

{% block result_list %}
<style>
    .news-card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
        background: #fafafa;
    }
    .news-card h3 {
        margin-top: 0;
    }
</style>

<div>
    {% for obj in cl.result_list %}
        <div class="news-card">
            <h3>{{ obj.title }}</h3>
            <p>{{ obj.short_description }}</p>
            <small>
                Автор: {{ obj.author }} |
                {{ obj.created_at|date:"d.m.Y H:i" }}
            </small>

            <div class="mt-3">
                <a href="{{ obj.get_delete_url }}" class="btn btn-danger btn-sm">Удалить</a>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
