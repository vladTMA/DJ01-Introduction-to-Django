<!--base.html-->
<!DOCTYPE html>
<html lang="ru">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>{% block title %}Мой Django проект{% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="{% static 'main/style.css' %}">
    {% block head %}{% endblock %}

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f6f9;
        }
        nav {
            background: #3b5d7a;
            padding: 12px 20px;
            display: flex;
            gap: 20px;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            opacity: 0.7;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
    </style>
</head>

<body>

{% block header %}
    {% include "main/blocks/header.html" %}
{% endblock %}

    <div class="container">
            {% block content %}{% endblock %}
    </div>

{% block footer %}
    {% include "main/blocks/footer.html" %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
