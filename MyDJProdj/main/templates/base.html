<!--base.html-->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Мой Django проект{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f6f9;
        }
        nav {
            background: #3b5d7a;
            padding: 12px 20px;
            display: flex;
            gap: 20px;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            opacity: 0.7;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Главная</a>
    <a href="/neo/">NEO</a>
    <a href="/about/">О проекте</a>
    <a href="/contacts/">Контакты</a>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
