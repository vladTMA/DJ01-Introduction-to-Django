{% block content %}
<div class="container mt-4">
    <h2>{{ title }}</h2>

    <form method="post" class="d-flex flex-column h-100">
    {% csrf_token %}

    <!-- Поля формы -->
    {{ form.as_p }}

    <!-- Блок кнопок -->

    </div>
</form>

    </form>
