<!---main/templates/main/article_detail.html--->
{% extends "base.html" %}
{% block title %}{{ item.title }}{% endblock %}

{% block content %}
<h1>{{ item.title }}</h1>
<p class="text-muted">
    {{ item.author }} | {{ item.created_at|date:"d.m.Y H:i" }}
</p>

<hr>

<p>{{ item.content|linebreaks }}</p>

<a href="{% url 'articles' %}" class="btn btn-secondary mt-3">← Назад</a>
{% endblock %}
