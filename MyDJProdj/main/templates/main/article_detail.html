<!---article_detail.html--->
{% extends "base.html" %}

{% block title %}{{ article.title }}{% endblock %}

{% block content %}
<div class="card shadow-sm p-4">
    <h1>{{ article.title }}</h1>

    <p class="text-muted">
        {{ article.created_at|date:"d.m.Y H:i" }}
    </p>

    <p class="mt-3">{{ article.body }}</p>

    <a href="{% url 'article_list' %}" class="btn btn-secondary mt-3">
        ← Назад к списку
    </a>
</div>
{% endblock %}
