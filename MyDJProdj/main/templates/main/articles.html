<!---main/templates/main/articles.html--->
{% extends "base.html" %}
{% block title %}Статьи{% endblock %}

{% block content %}
<h1 class="mb-4">Статьи</h1>

<div class="row">
    {% for item in items %}
        <div class="col-md-4">
            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ item.title }}</h5>
                    <p class="card-text">{{ item.subtitle }}</p>

                    <small class="text-muted">
                        {{ item.author }} | {{ item.created_at|date:"d.m.Y" }}
                    </small>

                    <div class="mt-3">
                        <a href="{{ item.get_absolute_url }}" class="btn btn-primary btn-sm">
                            Читать далее
                        </a>
                    </div>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

{% endblock %}
