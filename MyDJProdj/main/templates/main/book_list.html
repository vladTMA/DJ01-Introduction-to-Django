<!---main/templates/main/book_list.html--->
{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Список книг</h2>

    <div class="row">
        {% for book in books %}
        <div class="col-md-4 mb-4 d-flex">
            <div class="card h-100 shadow-sm">

                {% if book.image %}
                    <img src="{{ book.image.url }}" class="card-img-top book-img" alt="{{ book.title }}">
                {% else %}
                    <img src="{% static 'main/no-cover.png' %}" class="card-img-top book-img" alt="Нет обложки">
                {% endif %}

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ book.title }}</h5>
                    <p class="text-muted">Автор: {{ book.author }}</p>

                    <p class="card-text">{{ book.description|truncatewords:20 }}</p>

                    <div class="mt-auto">
                        <a href="{% url 'book_detail' book.id %}" class="btn btn-primary btn-sm mb-2">Подробнее</a>
                        <small class="text-muted d-block">{{ book.created_at }}</small>
                    </div>
                </div>

            </div>
        </div>
        {% endfor %}
    </div>

</div>
{% endblock %}
