<!---main/templates/main/article_delete_confirm.html--->
{% extends "base.html" %}

{% block content %}
<h2>Удалить статью "{{ article.title }}"?</h2>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Удалить</button>
    <a href="{% url 'article_detail' article.slug %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
